<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste API - Fit & Rápido</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .endpoint {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .endpoint h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .method {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 10px;
        }
        .method.post {
            background: #28a745;
            color: white;
        }
        .method.get {
            background: #007bff;
            color: white;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 10px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            min-height: 100px;
            font-family: 'Courier New', monospace;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        .response {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #28a745;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
        .error {
            border-left-color: #dc3545;
            background: #fff5f5;
        }
        .info {
            background: #e7f3ff;
            border-left: 4px solid #007bff;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .info p {
            margin: 5px 0;
            color: #004085;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Teste da API - Fit & Rápido</h1>
        <p class="subtitle">Teste os endpoints de autenticação diretamente no navegador</p>

        <div class="info">
            <p><strong>⚠️ Importante:</strong> Os endpoints de login e registro são POST, não GET.</p>
            <p>Use esta página ou ferramentas como Postman/Insomnia para testar.</p>
        </div>

        <!-- Cadastro -->
        <div class="endpoint">
            <h3>
                <span class="method post">POST</span>
                /auth/register
            </h3>
            <input type="email" id="register-email" placeholder="Email" value="teste@example.com">
            <input type="text" id="register-nome" placeholder="Nome" value="Usuário Teste">
            <input type="password" id="register-senha" placeholder="Senha" value="senha123">
            <button onclick="testRegister()">Cadastrar</button>
            <div id="register-response" class="response" style="display:none;"></div>
        </div>

        <!-- Login -->
        <div class="endpoint">
            <h3>
                <span class="method post">POST</span>
                /auth/login
            </h3>
            <input type="email" id="login-email" placeholder="Email" value="teste@example.com">
            <input type="password" id="login-senha" placeholder="Senha" value="senha123">
            <button onclick="testLogin()">Fazer Login</button>
            <div id="login-response" class="response" style="display:none;"></div>
        </div>

        <!-- Perfil -->
        <div class="endpoint">
            <h3>
                <span class="method get">GET</span>
                /auth/profile
            </h3>
            <input type="text" id="profile-token" placeholder="Token JWT (obtido no login)">
            <button onclick="testProfile()">Obter Perfil</button>
            <div id="profile-response" class="response" style="display:none;"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001';

        async function testRegister() {
            const email = document.getElementById('register-email').value;
            const nome = document.getElementById('register-nome').value;
            const senha = document.getElementById('register-senha').value;
            const responseDiv = document.getElementById('register-response');
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, nome, senha }),
                });
                
                const data = await response.json();
                responseDiv.style.display = 'block';
                responseDiv.className = 'response ' + (response.ok ? '' : 'error');
                responseDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                responseDiv.style.display = 'block';
                responseDiv.className = 'response error';
                responseDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function testLogin() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            const responseDiv = document.getElementById('login-response');
            const tokenInput = document.getElementById('profile-token');
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, senha }),
                });
                
                const data = await response.json();
                responseDiv.style.display = 'block';
                responseDiv.className = 'response ' + (response.ok ? '' : 'error');
                responseDiv.textContent = JSON.stringify(data, null, 2);
                
                // Preencher token automaticamente se login for bem-sucedido
                if (response.ok && data.access_token) {
                    tokenInput.value = data.access_token;
                }
            } catch (error) {
                responseDiv.style.display = 'block';
                responseDiv.className = 'response error';
                responseDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function testProfile() {
            const token = document.getElementById('profile-token').value;
            const responseDiv = document.getElementById('profile-response');
            
            if (!token) {
                responseDiv.style.display = 'block';
                responseDiv.className = 'response error';
                responseDiv.textContent = 'Erro: Token não fornecido';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/auth/profile`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                });
                
                const data = await response.json();
                responseDiv.style.display = 'block';
                responseDiv.className = 'response ' + (response.ok ? '' : 'error');
                responseDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                responseDiv.style.display = 'block';
                responseDiv.className = 'response error';
                responseDiv.textContent = 'Erro: ' + error.message;
            }
        }
    </script>
</body>
</html>
